<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEURAL ARCHITECT | DLSS 5</title>
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      // This happens when a dependency tries to polyfill fetch in an environment where it's read-only
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() { return originalFetch; },
          set(val) { 
            console.warn('Ignored attempt to overwrite window.fetch');
          }
        });
      } catch (e) {
        console.error('Failed to protect window.fetch:', e);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
